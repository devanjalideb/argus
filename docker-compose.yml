# ARGUS — production-inspired local stack: MySQL + the ARGUS app (API + built UI).
# Usage:  docker compose up --build   ->  http://localhost:8000
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: argus
      MYSQL_DATABASE: argus
    ports:
      - "3306:3306"
    volumes:
      - argus-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pargus"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: argus
      MYSQL_DB: argus
      ENVIRONMENT: production
      AI_ENABLED: "true"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    ports:
      - "8000:8000"

volumes:
  argus-mysql:
